<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="description" content="Sistema de vistoria de campo com GPS, fotos georreferenciadas e exportação KML">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VistoriaPro">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">

<!-- Android / desktop -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="96x96"   href="icons/icon-96.png">

<title>VistoriaPro - FUJAMA</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #060d1a;
    --bg2: #0a1628;
    --bg3: #0f1e35;
    --card: #111e33;
    --border: #1a2d4a;
    --accent: #00c8ff;
    --accent2: #0084ff;
    --green: #00e676;
    --red: #ff3d57;
    --yellow: #ffd740;
    --text: #e8edf5;
    --muted: #6b7fa3;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); }

  /* ─── SCREENS ─── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity .3s, transform .3s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ─── HOME ─── */
  #home {
    background: var(--bg);
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 32px 24px;
  }
  .home-bg {
    position: absolute; inset: 0; overflow: hidden; z-index: 0;
  }
  .home-bg::before {
    content: '';
    position: absolute;
    top: -40%; left: -20%;
    width: 140%; height: 80%;
    background: radial-gradient(ellipse at 40% 50%, rgba(0,200,255,.12) 0%, transparent 65%),
                radial-gradient(ellipse at 80% 30%, rgba(0,132,255,.08) 0%, transparent 60%);
    animation: pulseGlow 6s ease-in-out infinite alternate;
  }
  @keyframes pulseGlow { from { opacity:.7 } to { opacity:1 } }
  .grid-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .home-content { position: relative; z-index: 1; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
  .logo-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 32px rgba(0,200,255,.4);
  }
  .logo-text { font-family: var(--font-head); font-size: 38px; font-weight: 700; letter-spacing: 2px; }
  .logo-text span { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 52px; }
  .btn-main {
    width: 100%;
    padding: 18px 24px;
    border: none; border-radius: 14px;
    font-family: var(--font-head); font-size: 20px; font-weight: 600; letter-spacing: 1.5px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    position: relative; overflow: hidden;
    transition: transform .15s, box-shadow .15s;
    margin-bottom: 14px;
  }
  .btn-main:active { transform: scale(.97); }
  .btn-nova {
    background: linear-gradient(135deg, #0056cc, #00c8ff);
    color: #fff;
    box-shadow: 0 8px 32px rgba(0,132,255,.4);
  }
  .btn-nova:active { box-shadow: 0 4px 16px rgba(0,132,255,.3); }
  .btn-lista {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  .btn-main .btn-icon { font-size: 24px; }
  .btn-main .btn-label { flex: 1; text-align: left; }
  .btn-main .btn-arrow { font-size: 18px; opacity: .6; }
  .btn-main::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.1), transparent);
    border-radius: inherit;
  }
  .version { margin-top: 32px; font-size: 11px; color: var(--muted); letter-spacing: 2px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%; max-width: 400px;
    transform: translateY(20px); transition: transform .3s;
    box-shadow: 0 24px 80px rgba(0,0,0,.6);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--accent); }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .modal input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-body); font-size: 15px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 18px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; }
  .btn-cancel {
    flex: 1; padding: 13px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 10px; color: var(--muted);
    font-family: var(--font-body); font-size: 14px; cursor: pointer;
    transition: background .2s;
  }
  .btn-cancel:hover { background: var(--bg3); }
  .btn-confirm {
    flex: 2; padding: 13px;
    background: linear-gradient(135deg, #0056cc, #00c8ff);
    border: none; border-radius: 10px; color: #fff;
    font-family: var(--font-head); font-size: 16px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-confirm:hover { opacity: .9; }

  /* ─── VISTORIA SCREEN ─── */
  #vistoria {
    background: var(--bg);
    overflow: hidden;
  }
  .v-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .v-back {
    width: 36px; height: 36px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
  }
  .v-title-wrap { flex: 1; min-width: 0; }
  .v-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .v-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.4s infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .v-stats { display: flex; gap: 8px; flex-shrink: 0; }
  .stat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px; font-family: var(--font-head); font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .stat-pill span { color: var(--accent); }

  #map { flex: 1; width: 100%; min-height: 0; }

  .v-bottom {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; gap: 10px; align-items: center;
    flex-shrink: 0;
  }
  .btn-photo {
    flex: 1;
    background: linear-gradient(135deg, #0056cc, #00c8ff);
    border: none; border-radius: 14px;
    color: #fff; font-family: var(--font-head); font-size: 18px; font-weight: 700; letter-spacing: 1px;
    padding: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,132,255,.4);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-photo:active { transform: scale(.96); box-shadow: 0 2px 8px rgba(0,132,255,.3); }
  .btn-finish {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--yellow);
    font-family: var(--font-head); font-size: 13px; font-weight: 600;
    padding: 12px 14px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: background .2s;
  }
  .btn-finish:hover { background: var(--bg); }
  .btn-finish span:first-child { font-size: 20px; }

  /* hidden camera input */
  #cameraInput { display: none; }

  /* photo toast */
  .photo-toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--green); color: #000;
    padding: 10px 20px; border-radius: 30px;
    font-family: var(--font-head); font-size: 15px; font-weight: 600;
    z-index: 200; transition: transform .4s cubic-bezier(.17,.67,.35,1.2);
    white-space: nowrap;
  }
  .photo-toast.show { transform: translateX(-50%) translateY(0); }

  /* map marker pulse */
  .map-photo-marker { width: 28px; height: 28px; position: relative; }
  .map-photo-marker::before {
    content: '📷';
    font-size: 20px;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }

  /* ─── LISTA SCREEN ─── */
  #lista {
    background: var(--bg);
    overflow: hidden;
  }
  .l-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .l-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; flex: 1; }
  .l-count { background: var(--accent); color: var(--bg); border-radius: 20px; padding: 2px 10px; font-size: 13px; font-weight: 700; }
  .l-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .l-list::-webkit-scrollbar { width: 4px; }
  .l-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .l-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; }
  .l-empty .l-empty-icon { font-size: 48px; opacity: .4; }
  .l-empty p { font-size: 14px; }

  .vistoria-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .vistoria-card:hover { border-color: var(--accent); }
  .vc-head {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .vc-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .vc-info { flex: 1; min-width: 0; }
  .vc-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vc-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .vc-badges { display: flex; gap: 6px; }
  .badge {
    padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .badge-photo { background: rgba(0,200,255,.15); color: var(--accent); }
  .badge-pts { background: rgba(0,230,118,.15); color: var(--green); }
  .vc-toggle { font-size: 18px; color: var(--muted); transition: transform .3s; }
  .vc-toggle.open { transform: rotate(180deg); }

  .vc-files {
    border-top: 1px solid var(--border);
    max-height: 0; overflow: hidden;
    transition: max-height .4s ease;
  }
  .vc-files.open { max-height: 600px; }
  .file-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid rgba(26,45,74,.6);
    cursor: pointer;
    transition: background .15s;
  }
  .file-item:last-child { border-bottom: none; }
  .file-item:hover { background: var(--bg3); }
  .file-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
  .file-name { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .file-dl { color: var(--accent); font-size: 18px; flex-shrink: 0; }

  /* download all btn */
  .btn-dl-all {
    margin: 10px 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent);
    font-family: var(--font-head); font-size: 14px; font-weight: 600;
    padding: 10px 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: calc(100% - 32px);
    transition: background .2s;
  }
  .btn-dl-all:hover { background: var(--bg); }

  /* ─── PHOTO VIEWER ─── */
  .photo-viewer {
    position: fixed; inset: 0; background: #000; z-index: 300;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .photo-viewer.open { opacity: 1; pointer-events: all; }
  .pv-header {
    background: rgba(0,0,0,.8);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .pv-close { font-size: 24px; cursor: pointer; }
  .pv-name { font-family: var(--font-head); font-size: 15px; font-weight: 600; flex: 1; }
  .pv-dl { font-size: 22px; cursor: pointer; }
  #pvImg { flex: 1; object-fit: contain; width: 100%; }

  /* leaflet customization */
  .leaflet-tile-pane { filter: brightness(.85) saturate(.8) hue-rotate(10deg); }
  .leaflet-control-zoom a { background: var(--card) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .track-line { stroke: var(--accent); stroke-width: 3; stroke-opacity: .8; fill: none; }

  /* CANVAS for watermark */
  #wCanvas { display: none; }
</style>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(function(reg) {
    console.log('SW registrado, escopo:', reg.scope);
  }).catch(function(err) {
    console.warn('SW não registrado:', err.message);
  });
  window.addEventListener('online',  atualizarOnline);
  window.addEventListener('offline', atualizarOnline);
  window.addEventListener('load',    atualizarOnline);
}
function atualizarOnline() {
  var el = document.getElementById('onlineStatus');
  if (!el) return;
  el.textContent = navigator.onLine ? '🌐 Online' : '📵 Offline';
  el.style.color  = navigator.onLine ? 'var(--green)' : 'var(--yellow)';
}
</script>
</head>
<body>

<!-- ─── HOME ─── -->
<div class="screen" id="home">
  <div class="home-bg"><div class="grid-lines"></div></div>
  <div class="home-content">
    <div class="logo-wrap">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">VISTORIA<span>PRO</span></div>
    </div>
    <div class="tagline">Sistema de Vistoria de Campo</div>

    <button class="btn-main btn-nova" onclick="openNovaModal()">
      <span class="btn-icon">📋</span>
      <span class="btn-label">Nova Vistoria</span>
      <span class="btn-arrow">›</span>
    </button>
    <button class="btn-main btn-lista" onclick="openLista()">
      <span class="btn-icon">📁</span>
      <span class="btn-label">Vistorias Realizadas</span>
      <span class="btn-arrow">›</span>
    </button>

    <div class="version">V 1.0.0 · VISTORIAPRO</div>
  </div>
</div>

<!-- ─── MODAL NOVA VISTORIA ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>📋 Nova Vistoria</h2>
    <p>Digite o nome desta vistoria. Ele será usado para organizar as fotos e o mapa gerado.</p>
    <input type="text" id="nomeInput" placeholder="Ex: Vistoria Rua das Flores 123" maxlength="60">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="iniciarVistoria()">INICIAR →</button>
    </div>
  </div>
</div>

<!-- ─── VISTORIA ─── -->
<div class="screen hidden" id="vistoria">
  <div class="v-header">
    <div class="v-back" onclick="voltarHome()">←</div>
    <div class="v-title-wrap">
      <div class="v-name" id="vNome">—</div>
      <div class="v-status"><div class="dot"></div><span id="vTime">00:00</span> · <span id="vDist">0 m</span> · <span id="onlineStatus" style="font-size:10px;">🌐</span></div>
    </div>
    <div class="v-stats">
      <div class="stat-pill">📷 <span id="vPhotos">0</span></div>
      <div class="stat-pill">📍 <span id="vPoints">0</span></div>
    </div>
  </div>

  <div id="map"></div>

  <div class="v-bottom">
    <button class="btn-photo" onclick="tirarFoto()">
      <span style="font-size:26px">📷</span>
      TIRAR FOTO
    </button>
    <button class="btn-finish" onclick="finalizarVistoria()">
      <span>✅</span>
      <span style="font-size:11px">FINALIZAR</span>
    </button>
  </div>
</div>

<!-- ─── LISTA ─── -->
<div class="screen hidden" id="lista">
  <div class="l-header">
    <div class="v-back" onclick="showScreen('home')">←</div>
    <div class="l-title">Vistorias Realizadas</div>
    <div class="l-count" id="lCount">0</div>
  </div>
  <div class="l-list" id="lList"></div>
</div>

<!-- ─── CONFIRM MODAL ─── -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal">
    <h2 id="confirmTitle">Confirmar</h2>
    <p id="confirmMsg"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="confirmNo">Cancelar</button>
      <button class="btn-confirm" id="confirmYes">CONFIRMAR</button>
    </div>
  </div>
</div>

<!-- ─── PHOTO VIEWER ─── -->
<div class="photo-viewer" id="photoViewer">
  <div class="pv-header">
    <span class="pv-close" onclick="closePhotoViewer()">✕</span>
    <span class="pv-name" id="pvName"></span>
    <span class="pv-dl" onclick="downloadCurrentPhoto()">⬇</span>
  </div>
  <img id="pvImg" src="" alt="">
</div>

<!-- ─── TOAST ─── -->
<div class="photo-toast" id="photoToast">✓ Foto salva!</div>

<!-- ─── HIDDEN CAMERA ─── -->
<input type="file" id="cameraInput" accept="image/*" capture="environment">
<canvas id="wCanvas"></canvas>

<script>
// ─── STATE ───────────────────────────────────────────────
const DB_KEY = 'vistoriapro_data';
let db = loadDB();

let currentVistoria = null;
let map = null;
let polyline = null;
let trackCoords = [];
let watchId = null;
let lastPos = null;
let totalDist = 0;
let startTime = null;
let timerInterval = null;
let currentHeading = 0;

function loadLogo() {
  return new Promise(resolve => {
    if (logoImg) { resolve(logoImg); return; }
    logoImg = new Image();
    logoImg.onload = () => resolve(logoImg);
    logoImg.onerror = () => resolve(null);
    logoImg.src = LOGO_B64;
  });
}

// ─── DB ───────────────────────────────────────────────────
function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || { vistorias: {} }; }
  catch { return { vistorias: {} }; }
}
function saveDB() {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
  } catch(e) {
    // localStorage cheio - tentar salvar sem os dados das fotos (só metadados)
    console.warn('localStorage cheio, tentando salvar metadados:', e);
    try {
      var dbLight = { vistorias: {} };
      Object.keys(db.vistorias).forEach(function(k) {
        var v = db.vistorias[k];
        dbLight.vistorias[k] = {
          id: v.id, nome: v.nome, date: v.date,
          duration: v.duration, distance: v.distance,
          startTs: v.startTs, endTs: v.endTs,
          trackPoints: v.trackPoints,
          photos: v.photos.map(function(p) {
            return { name: p.name, date: p.date, time: p.time, lat: p.lat, lng: p.lng, heading: p.heading, dir: p.dir };
          })
        };
      });
      localStorage.setItem(DB_KEY, JSON.stringify(dbLight));
    } catch(e2) {
      console.error('Não foi possível salvar:', e2);
    }
  }
}

// ─── NAVIGATION ──────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ─── HOME ────────────────────────────────────────────────
function openNovaModal() {
  document.getElementById('nomeInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('nomeInput').focus(), 300);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('nomeInput').addEventListener('keydown', e => { if(e.key === 'Enter') iniciarVistoria(); });

// ─── INICIAR VISTORIA ────────────────────────────────────
function iniciarVistoria() {
  const nome = document.getElementById('nomeInput').value.trim();
  if (!nome) { document.getElementById('nomeInput').style.borderColor = 'var(--red)'; return; }
  document.getElementById('nomeInput').style.borderColor = '';
  closeModal();

  const id = 'v_' + Date.now();
  const dateStr = new Date().toLocaleDateString('pt-BR');
  currentVistoria = { id, nome, date: dateStr, photos: [], trackPoints: [], startTs: Date.now() };
  trackCoords = [];
  totalDist = 0;
  lastPos = null;
  startTime = Date.now();

  showScreen('vistoria');
  document.getElementById('vNome').textContent = nome;
  document.getElementById('vPhotos').textContent = '0';
  document.getElementById('vPoints').textContent = '0';
  document.getElementById('vPoints').textContent = '0';

  startTimer();
  // Inicia mapa primeiro, depois GPS dentro do callback
  setTimeout(function() {
    initMap();
    startTracker();
  }, 200);
}

// ─── MAP ─────────────────────────────────────────────────
function initMap() {
  if (map) { map.remove(); map = null; }
  map = L.map('map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  map.setView([-26.5, -49.0], 14); // Jaraguá do Sul como default
  polyline = L.polyline([], { color: '#00c8ff', weight: 4, opacity: .85 }).addTo(map);
}

// ─── GPS TRACKER ─────────────────────────────────────────
function startTracker() {
  if (!('geolocation' in navigator)) {
    showToast('GPS não suportado neste dispositivo');
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    onGPS,
    function(err) {
      var msgs = {1: 'Permissão negada — libere a localização no navegador', 2: 'GPS indisponível', 3: 'Timeout GPS'};
      showToast(msgs[err.code] || 'Erro GPS: ' + err.code);
      console.warn('GPS error', err.code, err.message);
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 }
  );
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

function stopTracker() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  window.removeEventListener('deviceorientationabsolute', onOrientation, true);
  window.removeEventListener('deviceorientation', onOrientation, true);
  if (window._posMarker && map) { try { map.removeLayer(window._posMarker); } catch(e){} window._posMarker = null; }
  if (window._posRing && map)   { try { map.removeLayer(window._posRing);   } catch(e){} window._posRing = null; }
}

function atualizarMarcadorPosicao(latlng) {
  if (!map) { console.warn('atualizarMarcadorPosicao: map is null'); return; }

  // Remove marcadores anteriores
  if (window._posMarker) { try { map.removeLayer(window._posMarker); } catch(e){} window._posMarker = null; }
  if (window._posRing)   { try { map.removeLayer(window._posRing);   } catch(e){} window._posRing = null; }

  // Anel externo (pulse)
  window._posRing = L.circleMarker(latlng, {
    radius: 20, color: '#00c8ff', fillColor: '#00c8ff',
    fillOpacity: 0.18, weight: 1.5
  }).addTo(map);

  // Ponto central sólido
  window._posMarker = L.circleMarker(latlng, {
    radius: 9, color: '#ffffff', fillColor: '#00c8ff',
    fillOpacity: 1, weight: 3
  }).addTo(map);

  // Atualiza status GPS na tela
  var el = document.getElementById('gpsStatus');
  if (el) el.textContent = 'GPS ' + latlng[0].toFixed(5) + ', ' + latlng[1].toFixed(5);
}

function onGPS(pos) {
  var lat = pos.coords.latitude;
  var lng = pos.coords.longitude;
  var latlng = [lat, lng];

  // Sempre atualiza marcador de posição e centraliza na primeira vez
  var primeiraPos = !lastPos;
  atualizarMarcadorPosicao(latlng);

  if (primeiraPos) {
    // Primeira posição: centraliza o mapa
    map.setView(latlng, 17);
  } else {
    // Posições seguintes: só registra trajetória se moveu >= 2m
    var d = haversine(lastPos[0], lastPos[1], lat, lng);
    if (d < 2) {
      lastPos = latlng; // atualiza posição mas não conta distância
      return;
    }
    totalDist += d;
    document.getElementById('vDist').textContent = totalDist >= 1000
      ? (totalDist/1000).toFixed(2) + ' km'
      : Math.round(totalDist) + ' m';
    // Segue o usuário suavemente
    map.panTo(latlng, { animate: true, duration: 0.5 });
  }

  lastPos = latlng;
  trackCoords.push(latlng);
  if (currentVistoria) currentVistoria.trackPoints.push({ lat: lat, lng: lng, ts: Date.now() });
  if (polyline) polyline.addLatLng(latlng);
  document.getElementById('vPoints').textContent = trackCoords.length;
}

function onOrientation(e) {
  if (e.alpha !== null) currentHeading = Math.round(e.alpha);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ─── TIMER ───────────────────────────────────────────────
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s/60), sec = s%60;
    document.getElementById('vTime').textContent = String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

// ─── FOTO ────────────────────────────────────────────────
function tirarFoto() {
  document.getElementById('cameraInput').value = '';
  document.getElementById('cameraInput').click();
}

document.getElementById('cameraInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => processPhoto(evt.target.result, file.name);
  reader.readAsDataURL(file);
});

function directionLabel(h) {
  const dirs = ['N','NE','L','SE','S','SO','O','NO'];
  return dirs[Math.round(h/45) % 8];
}

function processPhoto(dataUrl, origName) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('wCanvas');
    const ctx = canvas.getContext('2d');
    const W = img.width, H = img.height;
    canvas.width = W; canvas.height = H;
    ctx.drawImage(img, 0, 0);

    // watermark bar
    const barH = Math.max(80, H * 0.08);
    ctx.fillStyle = 'rgba(6,13,26,0.82)';
    ctx.fillRect(0, H - barH, W, barH);

    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR');
    const timeStr = now.toLocaleTimeString('pt-BR');
    const lat = lastPos ? lastPos[0].toFixed(6) : 'N/D';
    const lng = lastPos ? lastPos[1].toFixed(6) : 'N/D';
    const dir = directionLabel(currentHeading) + ' (' + currentHeading + '°)';
    const nomeV = currentVistoria.nome;

    const fs = Math.max(12, barH * 0.2);
    ctx.font = 'bold ' + fs + 'px Rajdhani, sans-serif';
    ctx.fillStyle = '#00c8ff';
    ctx.fillText('FUJAMA  |  ' + nomeV, 12, H - barH + fs + 6);

    ctx.font = (fs * 0.78) + 'px DM Sans, sans-serif';
    ctx.fillStyle = '#e8edf5';
    ctx.fillText('Data: ' + dateStr + '  Hora: ' + timeStr + '  Dir: ' + dir, 12, H - barH + fs * 2.1 + 6);
    ctx.fillText('GPS: ' + lat + ', ' + lng, 12, H - barH + fs * 3.1 + 6);

    // Logo FUJAMA - desenhar usando o objeto já carregado
    function finalizarComLogo(logo) {
      if (logo) {
        const logoH = barH * 0.85;
        const logoW = logoH * (logo.naturalWidth / logo.naturalHeight);
        const logoX = W - logoW - 12;
        const logoY = H - barH + (barH - logoH) / 2;
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        if (ctx.roundRect) {
          ctx.beginPath(); ctx.roundRect(logoX - 6, logoY - 4, logoW + 12, logoH + 8, 6); ctx.fill();
        } else {
          ctx.fillRect(logoX - 6, logoY - 4, logoW + 12, logoH + 8);
        }
        ctx.drawImage(logo, logoX, logoY, logoW, logoH);
      }

      const finalData = canvas.toDataURL('image/jpeg', 0.88);
      const fname = nomeV + '_' + dateStr.replace(/\//g,'-') + '_' + timeStr.replace(/:/g,'-') + '.jpg';
      const photoObj = {
        name: fname,
        data: finalData,
        date: dateStr,
        time: timeStr,
        lat: lastPos ? lastPos[0] : null,
        lng: lastPos ? lastPos[1] : null,
        heading: currentHeading,
        dir
      };
      currentVistoria.photos.push(photoObj);
      document.getElementById('vPhotos').textContent = currentVistoria.photos.length;

      if (lastPos && map) {
        const icon = L.divIcon({
          className: '',
          html: '<div style="background:#00c8ff;border:2px solid #fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 2px 8px rgba(0,200,255,.5)">📷</div>',
          iconSize: [20,20], iconAnchor: [10,10]
        });
        const marker = L.marker(lastPos, { icon }).addTo(map);
        marker.bindPopup('<b>' + fname + '</b><br>' + dateStr + ' ' + timeStr + '<br>Dir: ' + dir);
      }

      showToast('✓ Foto salva! (' + currentVistoria.photos.length + ')');
    }

    // Se logo já carregada, usa direto; senão carrega
    if (logoImg) {
      finalizarComLogo(logoImg);
    } else {
      const tempLogo = new Image();
      tempLogo.onload = function() { logoImg = tempLogo; finalizarComLogo(logoImg); };
      tempLogo.onerror = function() { finalizarComLogo(null); };
      tempLogo.src = LOGO_B64;
    }
  };
  img.src = dataUrl;
}

  const t = document.getElementById('photoToast');
  t.textContent = msg;

// ─── CUSTOM CONFIRM ──────────────────────────────────────
function customConfirm(title, msg, yesLabel, yesCb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmYes').textContent = yesLabel;
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmYes').onclick = () => {
    document.getElementById('confirmOverlay').classList.remove('open');
    yesCb();
  };
  document.getElementById('confirmNo').onclick = () => {
    document.getElementById('confirmOverlay').classList.remove('open');
  };
}

// ─── FINALIZAR ───────────────────────────────────────────
function finalizarVistoria() {
  document.getElementById('savingOverlay').style.display = 'flex';
  stopTracker();
  stopTimer();
  setTimeout(function() {
    try {
      currentVistoria.endTs = Date.now();
      currentVistoria.duration = Math.floor((currentVistoria.endTs - currentVistoria.startTs) / 1000);
      currentVistoria.distance = totalDist;
      db.vistorias[currentVistoria.id] = currentVistoria;
      saveDB();
    } catch(e) { console.warn('Erro ao salvar:', e); }
    var savedNome = currentVistoria ? currentVistoria.nome : 'Vistoria';
    currentVistoria = null;
    if (map) { try { map.off(); map.remove(); } catch(e) {} map = null; }
    document.getElementById('savingOverlay').style.display = 'none';
    showScreen('home');
    showToast('Vistoria "' + savedNome + '" salva!');
  }, 80);
}

function voltarHome() {
  customConfirm('⚠️ Sair da Vistoria', 'Sair sem salvar? Os dados desta vistoria serão perdidos.', 'SAIR SEM SALVAR', function() {
    stopTracker();
    stopTimer();
    currentVistoria = null;
    if (map) {
      try { map.off(); map.remove(); } catch(e) {}
      map = null;
    }
    showScreen('home');
  });
}

// ─── LISTA ───────────────────────────────────────────────
function openLista() {
  renderLista();
  showScreen('lista');
}

function renderLista() {
  const list = document.getElementById('lList');
  const vs = Object.values(db.vistorias).reverse();
  document.getElementById('lCount').textContent = vs.length;

  if (vs.length === 0) {
    list.innerHTML = `<div class="l-empty"><div class="l-empty-icon">📂</div><p>Nenhuma vistoria realizada ainda.</p></div>`;
    return;
  }

  list.innerHTML = '';
  vs.forEach(v => {
    const card = document.createElement('div');
    card.className = 'vistoria-card';
    const dur = v.duration ? formatDur(v.duration) : '—';
    const dist = v.distance ? (v.distance >= 1000 ? (v.distance/1000).toFixed(2)+' km' : Math.round(v.distance)+' m') : '—';
    card.innerHTML = `
      <div class="vc-head" onclick="toggleCard('${v.id}')">
        <div class="vc-icon">📋</div>
        <div class="vc-info">
          <div class="vc-name">${v.nome}</div>
          <div class="vc-meta">${v.date} · ${dur} · ${dist}</div>
        </div>
        <div class="vc-badges">
          <div class="badge badge-photo">📷 ${v.photos.length}</div>
        </div>
        <div class="vc-toggle" id="tgl_${v.id}">▾</div>
      </div>
      <div class="vc-files" id="files_${v.id}">
        ${renderFiles(v)}
      </div>`;
    list.appendChild(card);
  });
}

function renderFiles(v) {
  let html = '';
  if (v.photos.length === 0) {
    html += '<div class="file-item"><span class="file-icon">&#x2139;&#xFE0F;</span><span class="file-name">Nenhuma foto</span></div>';
  }
  v.photos.forEach(function(p, i) {
    html += '<div class="file-item" onclick="openPhoto(\''+v.id+'\','+i+')">';
    html += '<span class="file-icon">&#x1F5BC;&#xFE0F;</span>';
    html += '<span class="file-name">'+p.name+'</span>';
    html += '<span class="file-size">'+(p.lat ? p.lat.toFixed(4)+',' : '')+(p.lng ? p.lng.toFixed(4) : '')+'</span>';
    html += '<span class="file-dl" onclick="event.stopPropagation();dlPhoto(\''+v.id+'\','+i+')">&#x2B07;</span>';
    html += '</div>';
  });
  html += '<div style="display:flex;gap:8px;margin:10px 16px;">';
  html += '<button class="btn-dl-all" style="flex:1" onclick="dlAll(\''+v.id+'\')">&#x2B07; Fotos ('+v.photos.length+')</button>';
  html += '<button class="btn-dl-all" style="flex:1;color:var(--green);border-color:rgba(0,230,118,.3)" onclick="dlKML(\''+v.id+'\')">&#x1F5FA; KML</button>';
  html += '</div>';
  html += '<button class="btn-dl-all" style="margin-top:0;color:var(--yellow);border-color:rgba(255,215,64,.3)" onclick="dlZipCompleto(\''+v.id+'\')">&#x1F4E6; Baixar Tudo (Fotos + KML)</button>';
  return html;
}

function toggleCard(id) {
  const files = document.getElementById('files_' + id);
  const tgl = document.getElementById('tgl_' + id);
  files.classList.toggle('open');
  tgl.classList.toggle('open');
}

function formatDur(s) {
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

// ─── KML ─────────────────────────────────────────────────
function gerarKML(v) {
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function cdata(s) { return '<![CDATA[' + s + ']]' + '>'; }

  var durStr = v.duration ? (Math.floor(v.duration/60) + 'min ' + (v.duration%60) + 's') : 'N/D';
  var distStr = v.distance ? (v.distance >= 1000 ? (v.distance/1000).toFixed(2) + ' km' : Math.round(v.distance) + ' m') : 'N/D';

  // Placemarks das fotos
  var fotosKML = '';
  v.photos.forEach(function(p) {
    if (!p.lat || !p.lng) return;
    fotosKML += '\n    <Placemark>';
    fotosKML += '\n      <name>' + esc(p.name) + '</name>';
    fotosKML += '\n      <description>' + cdata('<b>Vistoria:</b> ' + esc(v.nome) + '<br><b>Data:</b> ' + esc(p.date) + ' ' + esc(p.time) + '<br><b>Direcao:</b> ' + esc(p.dir||'') + '<br><b>Foto:</b> ' + esc(p.name)) + '</description>';
    fotosKML += '\n      <styleUrl>#fotoStyle</styleUrl>';
    fotosKML += '\n      <Point><coordinates>' + p.lng + ',' + p.lat + ',0</coordinates></Point>';
    fotosKML += '\n    </Placemark>';
  });

  // Trajeto
  var trackKML = '';
  if (v.trackPoints && v.trackPoints.length > 0) {
    var coords = v.trackPoints.map(function(pt) { return pt.lng + ',' + pt.lat + ',0'; }).join(' ');
    trackKML += '\n    <Placemark>';
    trackKML += '\n      <name>Trajeto - ' + esc(v.nome) + '</name>';
    trackKML += '\n      <styleUrl>#trackStyle</styleUrl>';
    trackKML += '\n      <LineString><tessellate>1</tessellate><coordinates>' + coords + '</coordinates></LineString>';
    trackKML += '\n    </Placemark>';
  }

  // Inicio e Fim
  var inicioKML = '', fimKML = '';
  if (v.trackPoints && v.trackPoints.length > 0) {
    var ini = v.trackPoints[0];
    inicioKML = '\n    <Placemark><name>Inicio</name><styleUrl>#inicioStyle</styleUrl><Point><coordinates>' + ini.lng + ',' + ini.lat + ',0</coordinates></Point></Placemark>';
    var fim = v.trackPoints[v.trackPoints.length - 1];
    fimKML = '\n    <Placemark><name>Fim</name><styleUrl>#fimStyle</styleUrl><Point><coordinates>' + fim.lng + ',' + fim.lat + ',0</coordinates></Point></Placemark>';
  }

  var kml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  kml += '<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n';
  kml += '  <name>' + esc(v.nome) + '</name>\n';
  kml += '  <description>' + cdata('<b>Vistoria:</b> ' + esc(v.nome) + '<br><b>Data:</b> ' + esc(v.date||'') + '<br><b>Duracao:</b> ' + durStr + '<br><b>Distancia:</b> ' + distStr + '<br><b>Fotos:</b> ' + v.photos.length) + '</description>\n';

  kml += '  <Style id="fotoStyle"><IconStyle><color>ffff8800</color><scale>1.2</scale>';
  kml += '<Icon><href>https://maps.google.com/mapfiles/kml/shapes/camera.png</href></Icon></IconStyle>';
  kml += '<LabelStyle><scale>0.8</scale></LabelStyle></Style>\n';

  kml += '  <Style id="trackStyle"><LineStyle><color>ff00c8ff</color><width>4</width></LineStyle></Style>\n';

  kml += '  <Style id="inicioStyle"><IconStyle><color>ff00e676</color><scale>1.3</scale>';
  kml += '<Icon><href>https://maps.google.com/mapfiles/kml/paddle/go.png</href></Icon></IconStyle></Style>\n';

  kml += '  <Style id="fimStyle"><IconStyle><color>ff3d57ff</color><scale>1.3</scale>';
  kml += '<Icon><href>https://maps.google.com/mapfiles/kml/paddle/stop.png</href></Icon></IconStyle></Style>\n';

  kml += '  <Folder><name>Trajeto</name>';
  kml += inicioKML + trackKML + fimKML;
  kml += '\n  </Folder>\n';

  kml += '  <Folder><name>Fotos (' + v.photos.length + ')</name>';
  kml += fotosKML;
  kml += '\n  </Folder>\n';

  kml += '</Document>\n</kml>';
  return kml;
}

function dlKML(vid) {
  var v = db.vistorias[vid];
  var kml = gerarKML(v);
  var blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
  var url = URL.createObjectURL(blob);
  dlLink(url, v.nome + '.kml');
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
}

function dlZipCompleto(vid) {
  var v = db.vistorias[vid];
  var zip = new JSZip();
  var folder = zip.folder(v.nome);
  v.photos.forEach(function(p) {
    if (p.data) {
      folder.file(p.name, p.data.split(',')[1], { base64: true });
    }
  });
  folder.file(v.nome + '.kml', gerarKML(v));
  showToast('Gerando ZIP...');
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    dlLink(url, v.nome + '.zip');
    setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
  });
}


function dlAll(vid) {
  const v = db.vistorias[vid];
  if (v.photos.length === 0) return alert('Nenhuma foto para baixar.');
  // use JSZip
  const zip = new JSZip();
  const folder = zip.folder(v.nome);
  v.photos.forEach(p => {
    const base64 = p.data.split(',')[1];
    folder.file(p.name, base64, { base64: true });
  });
  zip.generateAsync({ type: 'blob' }).then(blob => {
    const url = URL.createObjectURL(blob);
    dlLink(url, v.nome + '.zip');
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  });
}
function dlLink(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
}
